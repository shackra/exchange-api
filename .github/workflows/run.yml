name: Publish-Currencies

on:
  schedule:
    - cron: '0 */2 * * *'  # every 120 minutes

  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for npm Trusted Publishing (OIDC)

jobs:
  build:
    runs-on: ubuntu-latest
    env:
        ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION=true

    steps:

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: |
          npm i
          npx playwright install --with-deps firefox

      - name: Running the command
        id: run-command
        continue-on-error: true
        run: node currscript.js

      - name: Rerun the command if previous failed
        if: ${{ steps.run-command.outcome == 'failure' }}
        run: node currscript.js

      - name: Set date today
        run: |
          echo "date_today=`date -uI`" >> "$GITHUB_ENV"
          echo "date_today_semver=`node semver-date.js`" >> "$GITHUB_ENV"

      - name: Generate tarball
        run: |
          7z a package.tar package -ttar
          7z a package.tar.gz package.tar -tgzip -mx=9 -aoa -mfb=258 -mmt=on

      # Trusted Publishing: npm uses OIDC automatically, no token needed.
      # For the FIRST publish only, set NPM_TOKEN secret and uncomment the
      # env block below. Once the package exists on npm, configure Trusted
      # Publishing on npmjs.com and remove the secret.
      - name: Publish to npm
        run: npm publish --access public package.tar.gz
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Add dist tag
        run: npm dist-tag add @shackra/exchange-api@${{ env.date_today_semver }} ${{ env.date_today }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Deploy to cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: |
           pages deploy --project-name=exchange-api package
           pages deploy --project-name=exchange-api --branch=latest package
           pages deploy --project-name=exchange-api --branch=${{ env.date_today }} package
