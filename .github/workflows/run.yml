name: Publish-Currencies

on:
  schedule:
    - cron: '0 */2 * * *'  # every 120 minutes

  workflow_dispatch:

permissions: write-all

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: |
          npm i
          npx playwright install --with-deps firefox

      - name: Running the command
        id: run-command
        continue-on-error: true
        run: node currscript.js

      - name: Rerun the command if previous failed
        if: ${{ steps.run-command.outcome == 'failure' }}
        run: node currscript.js

      - name: Set date today
        run: |
          echo "date_today=`date -uI`" >> "$GITHUB_ENV"
          echo "date_today_semver=`node semver-date.js`" >> "$GITHUB_ENV"

      - name: Generate tarball
        run: |
          7z a package.tar package -ttar
          7z a package.tar.gz package.tar -tgzip -mx=9 -aoa -mfb=258 -mmt=on

      - name: publish
        run: |
          npm publish --access public package.tar.gz
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Add dist tag
        run: |
          npm dist-tag add @shackra/exchange-api@${{ env.date_today_semver }} ${{ env.date_today }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Deploy to cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: |
           pages deploy --project-name=exchange-api package
           pages deploy --project-name=exchange-api --branch=latest package
           pages deploy --project-name=exchange-api --branch=${{ env.date_today }} package
